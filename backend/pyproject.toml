    "gunicorn>=23.0.0",
    "gevent>=24.0.0",
    "python-redis-lock>=4.0.0",
    "dumb-init>=1.2.5.post1",
]

[tool.uv]
package = false
default-groups = ["dev", "quay-upstream"]
override-dependencies = [
    "svglib==1.5.1", # this is needed otherwise Quay will try to install pycairo which doesn't work in Ubi
    "pyjwt>=2.12.0",
    "jwcrypto>=1.5.7",
]

[dependency-groups]
dev = [
    "pytest>=8.4.2",
]
quay-upstream = [
