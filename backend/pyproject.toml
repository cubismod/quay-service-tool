[project]
name = ""
version = "0.0.1"
requires-python = "==3.12.*"
dependencies = [
    "quay @ git+https://github.com/quay/quay.git@3f2fba1ab5f93d0b6bfeba93e437fabb68d97237",
    "markupsafe==2.1.3",
    "itsdangerous==2.1.2",
    "flask-restful==0.3.10",
    "flask-login==0.6.3",
    "python-keycloak>=4.0.0",
    "prometheus-client==0.13.1",
    "prometheus-flask-exporter==0.23.1",
    "text-unidecode==1.3",
    "psycopg2-binary>=2.9.10",
    "supervisor==4.3.0",
    "supervisor-logging==0.0.9",
    "supervisor-stdout @ git+https://github.com/quay/supervisor-stdout.git@9bdf630d0d1b4a16cf8b60b96adafb1ed98e7380",
    "pymysql==1.1.1",
    "resumablesha256==1.0",
    "deprecation==2.1.0",
    "opentelemetry-api==1.32.1",
    "opentelemetry-sdk==1.32.1",
